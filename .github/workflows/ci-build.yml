name: CI - Build and push images

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push language image
        uses: docker/build-push-action@v4
        with:
          context: ./Language-Translation-Tool
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/codealpha-language-translation:latest

      - name: Build & push object image
        uses: docker/build-push-action@v4
        with:
          context: ./Object-Detection-Project
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/codealpha-object-detection:latest

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v1
        with:
          project_id: ${{ secrets.GCP_PROJECT }}
          service_account_key: ${{ secrets.GCP_SA_KEY }}
          export_default_credentials: true

      - name: Deploy translation to Cloud Run
        env:
          IMAGE: ghcr.io/${{ github.repository_owner }}/codealpha-language-translation:latest
        run: |
          gcloud run deploy codealpha-translation \
            --image="$IMAGE" \
            --region=${{ secrets.GCP_REGION }} \
            --platform=managed \
            --allow-unauthenticated \
            --port=8501

      - name: Deploy object detection to Cloud Run
        env:
          IMAGE: ghcr.io/${{ github.repository_owner }}/codealpha-object-detection:latest
        run: |
          gcloud run deploy codealpha-object-detection \
            --image="$IMAGE" \
            --region=${{ secrets.GCP_REGION }} \
            --platform=managed \
            --allow-unauthenticated \
            --port=5000
